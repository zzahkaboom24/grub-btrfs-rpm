name: Watch upstream releases

on:
  schedule:
    - cron: '0 6 * * *'   # daily at 06:00 UTC
  workflow_dispatch:       # allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get latest upstream version
        id: upstream
        run: |
          LATEST=$(curl -sf https://api.github.com/repos/Antynea/grub-btrfs/releases/latest | jq -r .tag_name | sed 's/^v//')
          if [ -z "$LATEST" ] || [ "$LATEST" = "null" ]; then
            echo "Failed to fetch upstream version"
            exit 1
          fi
          echo "version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Upstream latest: $LATEST"

      - name: Get current spec version
        id: current
        run: |
          CURRENT=$(grep -E '^Version:' grub-btrfs.spec | awk '{print $2}')
          echo "version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "Current spec: $CURRENT"

      - name: Check if bump needed
        id: check
        run: |
          if [ "${{ steps.upstream.outputs.version }}" != "${{ steps.current.outputs.version }}" ]; then
            echo "needs_bump=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_bump=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump spec file
        if: steps.check.outputs.needs_bump == 'true'
        run: |
          NEW="${{ steps.upstream.outputs.version }}"
          sed -i "s/^Version:.*/Version:        $NEW/" grub-btrfs.spec
          sed -i "s/^Release:.*/Release:        1%{?dist}/" grub-btrfs.spec
          DATE=$(LC_ALL=C date "+%a %b %d %Y")
          ENTRY="* $DATE GitHub Actions <actions@github.com> - $NEW-1\\n- Update to upstream $NEW\\n"
          sed -i "/^%changelog/a $ENTRY" grub-btrfs.spec

      - name: Open pull request
        if: steps.check.outputs.needs_bump == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Bump to grub-btrfs ${{ steps.upstream.outputs.version }}"
          title: "Bump to grub-btrfs ${{ steps.upstream.outputs.version }}"
          body: |
            Upstream released a new version: `${{ steps.upstream.outputs.version }}`

            Auto-generated by `.github/workflows/upstream-watch.yml`.

            **Before merging:**
            - Verify the upstream changelog at https://github.com/Antynea/grub-btrfs/releases/tag/v${{ steps.upstream.outputs.version }}
            - Check whether the file layout changed (new files in `make install`?)
            - If file layout changed, update the `%files` section accordingly
            - Otherwise, merging this PR triggers a Copr rebuild
          branch: bump-${{ steps.upstream.outputs.version }}
          delete-branch: true
